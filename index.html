      els.generateExamBtn.disabled = state.bank.length === 0;
      els.aiGenerateBtn.disabled = state.bank.length === 0;
      updateExamButtons();
      els.exportJsonBtn.disabled = state.bank.length === 0;
    }

    function renderStats() {
      const statValues = Object.values(state.stats);
      const done = statValues.reduce((sum, item) => sum + (item.seen || 0), 0);
      const right = statValues.reduce((sum, item) => sum + (item.right || 0), 0);
      const wrongQuestions = state.bank.filter((item) => getStat(item).wrong > 0).length;
      els.totalCount.textContent = state.bank.length;
      els.wrongCount.textContent = wrongQuestions;
      els.doneCount.textContent = done;
      els.accuracy.textContent = done ? `${Math.round((right / done) * 100)}%` : '0%';
    }

    function renderFilters() {
      const currentSource = els.sourceFilter.value || '__all__';
      els.sourceFilter.innerHTML = '<option value="__all__">全部来源</option>';
      getSources().forEach((source) => {
        const option = document.createElement('option');
        option.value = source;
        option.textContent = source;
        els.sourceFilter.appendChild(option);
      });
      if (Array.from(els.sourceFilter.options).some((option) => option.value === currentSource)) {
        els.sourceFilter.value = currentSource;
      }

      const checked = new Set(selectedTypes());
      const types = getTypes();
      els.typeFilters.innerHTML = '';
      types.forEach((type) => {
        const id = `type_${type.replace(/\W/g, '_')}`;
        const label = document.createElement('label');
        label.innerHTML = `<input type="checkbox" id="${id}" value="${escapeHtml(type)}"> ${escapeHtml(type)}`;
        const input = label.querySelector('input');
        input.checked = checked.size ? checked.has(type) : true;
        input.addEventListener('change', () => renderList());
        els.typeFilters.appendChild(label);
      });
    }

    function renderList() {
      const items = filteredBank();
      els.questionList.innerHTML = '';
      if (!items.length) {
        els.questionList.innerHTML = '<div class="list-item"><span>没有匹配的题目。</span></div>';
        return;
      }
      items.slice(0, 120).forEach((item) => {
        const div = document.createElement('div');
        div.className = 'list-item';
        const stat = getStat(item);
        div.innerHTML = `
          <strong>${escapeHtml(item.type)} ${item.number ? `#${escapeHtml(item.number)}` : ''} ${stat.wrong ? ' / 错题' : ''}</strong>
          <span>${escapeHtml(item.question).slice(0, 86)}</span>
        `;
        div.addEventListener('click', () => showQuestion(item));
        els.questionList.appendChild(div);
      });
      if (items.length > 120) {
        const more = document.createElement('div');
        more.className = 'list-item';
        more.innerHTML = `<span>还有 ${items.length - 120} 题未显示，可继续搜索缩小范围。</span>`;
        els.questionList.appendChild(more);
      }
    }

    function wrongBookItems() {
      return state.bank.filter((item) => getStat(item).wrong > 0);
    }

    function renderWrongBook() {
      const items = wrongBookItems();
      els.wrongBookStatus.textContent = items.length ? `共 ${items.length} 道错题。` : '暂无错题。';
      els.practiceWrongBookBtn.disabled = items.length === 0;
      els.clearWrongBookBtn.disabled = items.length === 0;
      els.wrongBookList.innerHTML = '';
      if (!items.length) {
        els.wrongBookList.innerHTML = '<div class="list-item"><span>答错的题会自动进入这里。</span></div>';
        return;
      }
      items.slice(0, 80).forEach((item) => {
        const stat = getStat(item);
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `
          <strong>${escapeHtml(item.type)} · 错 ${stat.wrong} 次</strong>
          <span>${escapeHtml(item.question).slice(0, 78)}</span>
          <div class="mini-actions">
            <button type="button" data-action="open">查看</button>
            <button type="button" data-action="master">移出错题本</button>
          </div>
        `;
        div.querySelector('[data-action="open"]').addEventListener('click', () => {
          exitExam(false);
          setViewMode('single');
          showQuestion(item);
          showAnswer();
        });
        div.querySelector('[data-action="master"]').addEventListener('click', () => {
          const old = getStat(item);
          setQuestionStat(item.id, { ...old, wrong: 0, mastered: true });
          setStatus('已从错题本移出。');
        });
        els.wrongBookList.appendChild(div);
      });
      if (items.length > 80) {
        const more = document.createElement('div');
        more.className = 'list-item';
        more.innerHTML = `<span>还有 ${items.length - 80} 道错题未显示，可用“练错题”随机复习。</span>`;
        els.wrongBookList.appendChild(more);
      }
    }

    function setStatus(text) {
      els.status.textContent = text;
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(state.bank, null, 2)], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `practice-question-bank-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function downloadDataFile() {
      const blob = new Blob([JSON.stringify(buildDataFilePayload(), null, 2)], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `question-bank-data-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function openDataFile() {
      try {
        if ('showOpenFilePicker' in window) {
          const [handle] = await window.showOpenFilePicker({
            types: [{ description: '题库数据文件', accept: { 'application/json': ['.json'] } }],
            multiple: false,
          });
          const file = await handle.getFile();
          const data = JSON.parse(await file.text());
          state.dataFileHandle = handle;
          applyDataFilePayload(data);
          setStatus(`已打开数据文件：${file.name}，共 ${state.bank.length} 题。`);
          return;
        }
        els.jsonFile.click();
        setStatus('当前浏览器不支持直接打开数据文件，已切换为普通 JSON 导入。');
      } catch (error) {
        if (error.name !== 'AbortError') setStatus(`打开数据文件失败：${error.message}`);
      }
    }

    async function saveDataFile() {
      const content = JSON.stringify(buildDataFilePayload(), null, 2);
      try {
        if ('showSaveFilePicker' in window) {
          if (!state.dataFileHandle) {
            state.dataFileHandle = await window.showSaveFilePicker({
              suggestedName: 'question-bank-data.json',
              types: [{ description: '题库数据文件', accept: { 'application/json': ['.json'] } }],
            });
          }
          const writable = await state.dataFileHandle.createWritable();
          await writable.write(content);
          await writable.close();
          setStatus(`已保存到数据文件：${state.bank.length} 题，${wrongBookItems().length} 道错题。`);
          return;
        }
        downloadDataFile();
        setStatus('当前浏览器不支持直接写文件，已下载数据备份。');
      } catch (error) {
        if (error.name !== 'AbortError') setStatus(`保存数据文件失败：${error.message}`);
      }
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    els.jsonFile.addEventListener('change', async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      try {
        const text = await readFile(file);
        const data = JSON.parse(text);
        if (data.libraries || data.bank || data.stats) {
          applyDataFilePayload(data);
          setStatus(`已导入数据文件：${state.bank.length} 题。`);
        } else {
          mergeIntoBank(Array.isArray(data) ? data : data.questions || []);
        }
      } catch (error) {
        setStatus(`JSON 导入失败：${error.message}`);
      } finally {
        event.target.value = '';
      }
    });

    els.csvFile.addEventListener('change', async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      try {
        const text = await readFile(file);
        mergeIntoBank(parseCsv(text));
      } catch (error) {
        setStatus(`CSV 导入失败：${error.message}`);
      } finally {
        event.target.value = '';
      }
    });

    els.openDataFileBtn.addEventListener('click', openDataFile);
    els.saveDataFileBtn.addEventListener('click', saveDataFile);
    els.librarySelect.addEventListener('change', () => switchLibrary(els.librarySelect.value));
    els.newLibraryBtn.addEventListener('click', createLibrary);
    els.renameLibraryBtn.addEventListener('click', renameLibrary);
    els.deleteLibraryBtn.addEventListener('click', deleteLibrary);
    els.exportJsonBtn.addEventListener('click', exportJson);
    els.aiGenerateBtn.addEventListener('click', generateAiQuestions);
    els.clearBtn.addEventListener('click', () => {
      const library = activeLibrary();
      if (!confirm(`确定清空当前题库“${library.name}”和练习记录吗？其他题库不会受影响。`)) return;
      state.bank = [];
      state.stats = {};
      state.current = null;
      state.dataFileHandle = null;
      els.quiz.classList.add('hidden');
      els.empty.classList.remove('hidden');
      save();
      setStatus(`已清空题库：${library.name}`);
    });
    els.randomBtn.addEventListener('click', pickRandom);
    els.generateExamBtn.addEventListener('click', generateExam);
    els.prevPaperBtn.addEventListener('click', () => switchPaper(-1));
    els.nextPaperBtn.addEventListener('click', () => switchPaper(1));
    els.submitExamBtn.addEventListener('click', submitExam);
    els.exitExamBtn.addEventListener('click', () => exitExam(true));
    els.practiceWrongBookBtn.addEventListener('click', () => {
      const items = wrongBookItems();
      if (!items.length) {
        setStatus('错题本为空。');
        return;
      }
      exitExam(false);
      setViewMode('single');
      els.mode.value = 'wrong';
      renderList();
      showQuestion(items[Math.floor(Math.random() * items.length)]);
      setStatus('已进入错题本练习。');
    });
    els.clearWrongBookBtn.addEventListener('click', () => {
      const items = wrongBookItems();
      if (!items.length) return;
      if (!confirm(`确定清空 ${items.length} 道错题吗？题库不会删除。`)) return;
      items.forEach((item) => {
        state.stats[item.id] = { ...getStat(item), wrong: 0, mastered: true };
      });
      save();
      setStatus('错题本已清空。');
    });
    els.resetStatsBtn.addEventListener('click', () => {
      if (!confirm('确定重置练习记录吗？题库不会删除。')) return;
      state.stats = {};
      save();
      setStatus('练习记录已重置。');
    });
    els.sourceFilter.addEventListener('change', () => {
      syncExamConfigAvailability();
      renderList();
    });
    els.mode.addEventListener('change', renderList);
    els.searchInput.addEventListener('input', renderList);
    els.singleModeBtn.addEventListener('click', () => setViewMode('single'));
    els.paperModeBtn.addEventListener('click', () => setViewMode('paper'));
    els.checkBtn.addEventListener('click', checkCurrent);
    els.showAnswerBtn.addEventListener('click', showAnswer);
    els.markWrongBtn.addEventListener('click', markWrong);
    els.markRightBtn.addEventListener('click', markRight);
    els.nextBtn.addEventListener('click', nextQuestion);
    window.addEventListener('message', receiveSharedQuestionBank);

    loadAiSettings();
    render();
    persistLibraries();
    if (state.bank.length) {
      setStatus(`已从本地加载“${activeLibrary().name}” ${state.bank.length} 题。`);
    }
  </script>
</body>
</html>
