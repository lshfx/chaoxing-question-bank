<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>超星题库随机练习</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d9e2ef;
      --blue: #2563eb;
      --blue-soft: #eaf2ff;
      --green: #138a43;
      --red: #c62828;
      --amber: #a16207;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    .app {
      max-width: 1500px;
      margin: 0 auto;
      padding: 16px 18px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .layout > aside {
      position: sticky;
      top: 12px;
      max-height: calc(100vh - 24px);
      overflow-y: auto;
      padding-right: 4px;
      scrollbar-gutter: stable;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.05);
    }

    .panel + .panel {
      margin-top: 14px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfdff;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.2;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    button,
    .file-btn,
    select,
    input[type="number"],
    input[type="search"],
    input[type="text"],
    input[type="password"] {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 0 11px;
      font: inherit;
    }

    select,
    input[type="number"],
    input[type="search"],
    input[type="text"],
    input[type="password"] {
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    button,
    .file-btn {
      cursor: pointer;
      user-select: none;
    }

    button.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    button.soft {
      border-color: #bcd3ff;
      background: var(--blue-soft);
      color: #1648b7;
    }

    button.danger {
      border-color: #fecaca;
      background: #fff1f2;
      color: #be123c;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .file-btn input {
      display: none;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    .exam-grid {
      display: grid;
      gap: 8px;
    }

    .exam-row {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .exam-row span {
      color: #344054;
      font-size: 13px;
    }

    .exam-row input {
      width: 100%;
      min-width: 0;
    }

    .exam-row .exam-hint {
      grid-column: span 2;
      color: var(--muted);
    }

    label {
      color: var(--muted);
      font-size: 13px;
    }

    .check-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 8px 0 12px;
    }

    .check-list label {
      display: flex;
      gap: 6px;
      align-items: center;
      color: var(--text);
      font-size: 14px;
    }

    .status {
      margin-top: 10px;
      min-height: 22px;
      color: var(--muted);
    }

    .question-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: #1648b7;
      font-size: 13px;
      white-space: nowrap;
    }

    .question {
      margin: 0 0 16px;
      font-size: 19px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .options {
      display: grid;
      gap: 10px;
      margin: 12px 0 16px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      width: 100%;
      text-align: left;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }

    .option:hover {
      border-color: #93b4ff;
      background: #fbfdff;
    }

    .option.selected {
      border-color: var(--blue);
      background: var(--blue-soft);
    }

    .option.correct {
      border-color: #8fd3a9;
      background: #ecfdf3;
    }

    .option.wrong {
      border-color: #f3a2a2;
      background: #fff1f2;
    }

    .key {
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: #eef2f7;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 116px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: inherit;
    }

    .answer-box {
      display: none;
      margin-top: 14px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdff;
    }

    .answer-box.show {
      display: block;
    }

    .summary {
      display: none;
      margin-bottom: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .summary.show {
      display: block;
    }

    .summary-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      background: #f8fbff;
      border-bottom: 1px solid var(--line);
    }

    .summary-score {
      font-size: 28px;
      font-weight: 800;
      color: var(--blue);
    }

    .summary-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
      gap: 8px;
      padding: 12px;
    }

    .summary-list button {
      min-height: 34px;
    }

    .summary-list button.ok {
      border-color: #8fd3a9;
      background: #ecfdf3;
      color: var(--green);
    }

    .summary-list button.bad {
      border-color: #f3a2a2;
      background: #fff1f2;
      color: var(--red);
    }

    .summary-list button.pending {
      border-color: #facc15;
      background: #fefce8;
      color: var(--amber);
    }

    .answer-line {
      margin: 0 0 8px;
    }

    .answer-line strong {
      color: var(--green);
    }

    .result {
      margin: 10px 0 0;
      font-weight: 700;
    }

    .result.ok {
      color: var(--green);
    }

    .result.bad {
      color: var(--red);
    }

    .tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .view-switch {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .segmented {
      display: inline-flex;
      gap: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .segmented button {
      border: 0;
      border-radius: 0;
      background: #fff;
    }

    .segmented button.active {
      background: var(--blue);
      color: #fff;
    }

    .paper-preview {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 230px;
      gap: 16px;
      align-items: start;
    }

    .paper-content {
      min-width: 0;
    }

    .paper-card {
      position: sticky;
      top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .paper-card h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .paper-section-title {
      margin: 22px 0 12px;
      font-size: 18px;
    }

    .paper-section-title:first-child {
      margin-top: 0;
    }

    .paper-question {
      padding: 16px 0 20px;
      border-bottom: 1px solid #edf1f7;
      scroll-margin-top: 16px;
    }

    .paper-question-title {
      margin-bottom: 12px;
      font-size: 16px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .paper-option {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 44px;
      margin: 7px 0;
      padding: 8px 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      text-align: left;
    }

    .paper-option:hover {
      background: #f8fbff;
      border-color: var(--line);
    }

    .paper-option.selected {
      background: #f3f7fc;
      border-color: #cfe0f7;
    }

    .paper-option .key {
      border: 1px solid #dbe4f0;
      background: #fff;
      border-radius: 999px;
    }

    .answer-card-section {
      margin-top: 12px;
    }

    .answer-card-section strong {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
    }

    .answer-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
    }

    .answer-grid button {
      min-height: 32px;
      padding: 0;
      border-color: #8bbcff;
      color: var(--blue);
    }

    .answer-grid button.answered {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .answer-grid button.wrong {
      background: #fff1f2;
      color: var(--red);
      border-color: #f3a2a2;
    }

    .answer-grid button.ok {
      background: #ecfdf3;
      color: var(--green);
      border-color: #8fd3a9;
    }

    .empty {
      padding: 40px 20px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fbfdff;
    }

    .list {
      max-height: 360px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .list-item {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
    }

    .list-item:last-child {
      border-bottom: 0;
    }

    .list-item:hover {
      background: #f8fbff;
    }

    .list-item strong {
      display: block;
      font-size: 13px;
      color: #344054;
    }

    .list-item span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .list-item .mini-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .list-item .mini-actions button {
      min-height: 28px;
      padding: 0 8px;
      font-size: 12px;
    }

    .wrong-review {
      padding: 12px;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .wrong-review h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .wrong-review-item {
      width: 100%;
      min-height: auto;
      margin-top: 8px;
      padding: 10px;
      border: 1px solid #f3a2a2;
      border-radius: 8px;
      background: #fff7f7;
      color: var(--text);
      text-align: left;
    }

    .wrong-review-item strong {
      display: block;
      color: var(--red);
    }

    .wrong-review-item span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 860px) {
      .app {
        padding: 14px;
      }

      header {
        display: block;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .layout > aside {
        position: static;
        max-height: none;
        overflow: visible;
        padding-right: 0;
      }

      .paper-preview {
        grid-template-columns: 1fr;
      }

      .paper-card {
        position: static;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>超星题库随机练习</h1>
        <div class="subtitle">导入油猴脚本导出的 JSON 或 CSV，本地随机刷题。</div>
      </div>
      <div class="row">
        <label class="file-btn soft">
          导入 JSON
          <input id="jsonFile" type="file" accept=".json,application/json">
        </label>
        <label class="file-btn soft">
          导入 CSV
          <input id="csvFile" type="file" accept=".csv,text/csv">
        </label>
        <button id="openDataFileBtn" class="soft" type="button">打开数据文件</button>
        <button id="saveDataFileBtn" class="primary" type="button">保存数据文件</button>
      </div>
    </header>

    <section class="layout">
      <aside>
        <div class="panel">
          <h2>题库</h2>
          <div class="field">
            <label for="librarySelect">当前题库</label>
            <select id="librarySelect"></select>
          </div>
          <div class="row" style="margin-bottom: 10px">
            <button id="newLibraryBtn" class="soft" type="button">新建题库</button>
            <button id="renameLibraryBtn" type="button">重命名</button>
            <button id="deleteLibraryBtn" class="danger" type="button">删除题库</button>
          </div>
          <div class="stats">
            <div class="stat">
              <strong id="totalCount">0</strong>
              <span>总题数</span>
            </div>
            <div class="stat">
              <strong id="wrongCount">0</strong>
              <span>错题数</span>
            </div>
            <div class="stat">
              <strong id="doneCount">0</strong>
              <span>已练习</span>
            </div>
            <div class="stat">
              <strong id="accuracy">0%</strong>
              <span>正确率</span>
            </div>
          </div>
          <div class="status" id="status">请先导入题库文件。</div>
          <div class="row">
            <button id="exportJsonBtn">导出题库</button>
            <button id="clearBtn" class="danger">清空</button>
          </div>
        </div>

        <div class="panel">
          <h2>AI 扩展生题</h2>
          <div class="field">
            <label for="aiApiBase">接口地址</label>
            <input id="aiApiBase" type="text" value="https://api.openai.com/v1" placeholder="https://api.openai.com/v1">
          </div>
          <div class="field">
            <label for="aiApiKey">API Key</label>
            <input id="aiApiKey" type="password" placeholder="只在当前页面使用，不会保存">
          </div>
          <div class="field">
            <label for="aiModel">模型</label>
            <input id="aiModel" type="text" value="gpt-4o-mini" placeholder="按你的接口填写模型名">
          </div>
          <div class="exam-grid">
            <div class="exam-row">
              <span>数量</span>
              <input id="aiCount" type="number" min="1" max="30" value="5">
              <span class="exam-hint">建议 5-10 题</span>
            </div>
            <div class="field">
              <label for="aiType">题型偏好</label>
              <select id="aiType">
                <option value="auto">自动匹配题库比例</option>
                <option value="单选题">单选题</option>
                <option value="多选题">多选题</option>
                <option value="判断题">判断题</option>
                <option value="填空题">填空题</option>
                <option value="简答题">简答题</option>
              </select>
            </div>
          </div>
          <div class="row" style="margin-top: 12px">
            <button id="aiGenerateBtn" class="primary">分析并生题</button>
          </div>
          <div class="status" id="aiStatus">根据当前题库归纳范围，再生成新题。</div>
        </div>

        <div class="panel">
          <h2>出题设置</h2>
          <div class="field">
            <label for="sourceFilter">来源</label>
            <select id="sourceFilter"></select>
          </div>
          <div class="field">
            <label for="mode">练习范围</label>
            <select id="mode">
              <option value="all">全部题目</option>
              <option value="wrong">只练错题</option>
              <option value="unseen">优先未练</option>
            </select>
          </div>
          <label>题型</label>
          <div class="check-list" id="typeFilters"></div>
          <div class="row">
            <button id="randomBtn" class="primary">随机出题</button>
            <button id="resetStatsBtn">重置练习记录</button>
          </div>
        </div>

        <div class="panel">
          <h2>模拟卷</h2>
          <div class="exam-grid">
            <div class="exam-row">
              <span>套数</span>
              <input id="examSetCount" type="number" min="1" value="1">
              <span class="exam-hint">生成几套卷</span>
            </div>
            <div class="exam-row">
              <span>题型</span>
              <label>数量</label>
              <label>每题分</label>
            </div>
            <div class="exam-row">
              <span>单选题</span>
              <input id="examSingleCount" type="number" min="0" value="20">
              <input id="examSingleScore" type="number" min="0" step="0.5" value="2">
            </div>
            <div class="exam-row">
              <span>多选题</span>
              <input id="examMultiCount" type="number" min="0" value="5">
              <input id="examMultiScore" type="number" min="0" step="0.5" value="3">
            </div>
            <div class="exam-row">
              <span>判断题</span>
              <input id="examJudgeCount" type="number" min="0" value="10">
              <input id="examJudgeScore" type="number" min="0" step="0.5" value="1">
            </div>
            <div class="exam-row">
              <span>填空题</span>
              <input id="examFillCount" type="number" min="0" value="15">
              <input id="examFillScore" type="number" min="0" step="0.5" value="1">
            </div>
            <div class="exam-row">
              <span>简答题</span>
              <input id="examShortCount" type="number" min="0" value="1">
              <input id="examShortScore" type="number" min="0" step="0.5" value="20">
            </div>
          </div>
          <div class="row" style="margin-top: 12px">
            <button id="generateExamBtn" class="primary">生成模拟卷</button>
            <button id="prevPaperBtn" disabled>上一套</button>
            <button id="nextPaperBtn" disabled>下一套</button>
            <button id="submitExamBtn" class="soft" disabled>提交改分</button>
            <button id="exitExamBtn">退出模拟</button>
          </div>
          <div class="status" id="examStatus">按题型数量随机组卷，分值可自行调整。</div>
        </div>

        <div class="panel">
          <h2>错题本</h2>
          <div class="status" id="wrongBookStatus">暂无错题。</div>
          <div class="row">
            <button id="practiceWrongBookBtn" class="soft">练错题</button>
            <button id="clearWrongBookBtn" class="danger">清空错题</button>
          </div>
          <div class="list" id="wrongBookList" style="margin-top: 10px"></div>
        </div>

        <div class="panel">
          <h2>题目列表</h2>
          <div class="field">
            <input id="searchInput" type="search" placeholder="搜索题干/答案/解析">
          </div>
          <div class="list" id="questionList"></div>
        </div>
      </aside>

      <section class="panel">
        <div class="view-switch">
          <div class="segmented">
            <button id="singleModeBtn" class="active" type="button">单题模式</button>
            <button id="paperModeBtn" type="button">全卷预览</button>
          </div>
          <span class="badge" id="viewHint">当前为单题练习</span>
        </div>
        <div id="empty" class="empty">导入题库后，点击“随机出题”开始练习。</div>
        <div id="examSummary" class="summary"></div>
        <div id="paperPreview" class="hidden"></div>

        <article id="quiz" class="hidden">
          <div class="question-head">
            <div>
              <span class="badge" id="typeBadge">题型</span>
              <span class="badge" id="sourceBadge">来源</span>
            </div>
            <span class="badge" id="progressBadge">0 / 0</span>
          </div>

          <h2 class="question" id="questionText"></h2>
          <div id="options" class="options"></div>
          <textarea id="textAnswer" class="hidden" placeholder="这里可以写下自己的答案，再点击显示答案进行核对。"></textarea>

          <div class="tools">
            <button id="checkBtn" class="primary">提交判断</button>
            <button id="showAnswerBtn">显示答案</button>
            <button id="markWrongBtn">加入错题</button>
            <button id="markRightBtn">标记掌握</button>
            <button id="nextBtn" class="soft">下一题</button>
          </div>

          <div id="result" class="result"></div>
          <div id="answerBox" class="answer-box"></div>
        </article>
      </section>
    </section>
  </main>

  <script>
    const STORE_KEY = 'cx_practice_question_bank_v1';
    const STATS_KEY = 'cx_practice_stats_v1';
    const LIBRARIES_KEY = 'cx_practice_libraries_v2';
    const AI_SETTINGS_KEY = 'cx_practice_ai_settings_v1';

    const els = {
      jsonFile: document.querySelector('#jsonFile'),
      csvFile: document.querySelector('#csvFile'),
      openDataFileBtn: document.querySelector('#openDataFileBtn'),
      saveDataFileBtn: document.querySelector('#saveDataFileBtn'),
      librarySelect: document.querySelector('#librarySelect'),
      newLibraryBtn: document.querySelector('#newLibraryBtn'),
      renameLibraryBtn: document.querySelector('#renameLibraryBtn'),
      deleteLibraryBtn: document.querySelector('#deleteLibraryBtn'),
      totalCount: document.querySelector('#totalCount'),
      wrongCount: document.querySelector('#wrongCount'),
      doneCount: document.querySelector('#doneCount'),
      accuracy: document.querySelector('#accuracy'),
      status: document.querySelector('#status'),
      exportJsonBtn: document.querySelector('#exportJsonBtn'),
      clearBtn: document.querySelector('#clearBtn'),
      aiApiBase: document.querySelector('#aiApiBase'),
      aiApiKey: document.querySelector('#aiApiKey'),
      aiModel: document.querySelector('#aiModel'),
      aiCount: document.querySelector('#aiCount'),
      aiType: document.querySelector('#aiType'),
      aiGenerateBtn: document.querySelector('#aiGenerateBtn'),
      aiStatus: document.querySelector('#aiStatus'),
      sourceFilter: document.querySelector('#sourceFilter'),
      mode: document.querySelector('#mode'),
      typeFilters: document.querySelector('#typeFilters'),
      randomBtn: document.querySelector('#randomBtn'),
      resetStatsBtn: document.querySelector('#resetStatsBtn'),
      examSetCount: document.querySelector('#examSetCount'),
      examSingleCount: document.querySelector('#examSingleCount'),
      examSingleScore: document.querySelector('#examSingleScore'),
      examMultiCount: document.querySelector('#examMultiCount'),
      examMultiScore: document.querySelector('#examMultiScore'),
      examJudgeCount: document.querySelector('#examJudgeCount'),
      examJudgeScore: document.querySelector('#examJudgeScore'),
      examFillCount: document.querySelector('#examFillCount'),
      examFillScore: document.querySelector('#examFillScore'),
      examShortCount: document.querySelector('#examShortCount'),
      examShortScore: document.querySelector('#examShortScore'),
      generateExamBtn: document.querySelector('#generateExamBtn'),
      prevPaperBtn: document.querySelector('#prevPaperBtn'),
      nextPaperBtn: document.querySelector('#nextPaperBtn'),
      submitExamBtn: document.querySelector('#submitExamBtn'),
      exitExamBtn: document.querySelector('#exitExamBtn'),
      examStatus: document.querySelector('#examStatus'),
      wrongBookStatus: document.querySelector('#wrongBookStatus'),
      wrongBookList: document.querySelector('#wrongBookList'),
      practiceWrongBookBtn: document.querySelector('#practiceWrongBookBtn'),
      clearWrongBookBtn: document.querySelector('#clearWrongBookBtn'),
      searchInput: document.querySelector('#searchInput'),
      questionList: document.querySelector('#questionList'),
      singleModeBtn: document.querySelector('#singleModeBtn'),
      paperModeBtn: document.querySelector('#paperModeBtn'),
      viewHint: document.querySelector('#viewHint'),
      empty: document.querySelector('#empty'),
      examSummary: document.querySelector('#examSummary'),
      paperPreview: document.querySelector('#paperPreview'),
      quiz: document.querySelector('#quiz'),
      typeBadge: document.querySelector('#typeBadge'),
      sourceBadge: document.querySelector('#sourceBadge'),
      progressBadge: document.querySelector('#progressBadge'),
      questionText: document.querySelector('#questionText'),
      options: document.querySelector('#options'),
      textAnswer: document.querySelector('#textAnswer'),
      checkBtn: document.querySelector('#checkBtn'),
      showAnswerBtn: document.querySelector('#showAnswerBtn'),
      markWrongBtn: document.querySelector('#markWrongBtn'),
      markRightBtn: document.querySelector('#markRightBtn'),
      nextBtn: document.querySelector('#nextBtn'),
      result: document.querySelector('#result'),
      answerBox: document.querySelector('#answerBox'),
    };

    const initialData = loadInitialData();
    const state = {
      libraries: initialData.libraries,
      activeLibraryId: initialData.activeLibraryId,
      current: null,
      selected: new Set(),
      queue: [],
      viewMode: 'single',
      dataFileHandle: null,
      exam: {
        active: false,
        paperIndex: 0,
        index: 0,
        papers: [],
      },
    };

    Object.defineProperty(state, 'bank', {
      get() {
        return activeLibrary().bank;
      },
      set(value) {
        activeLibrary().bank = dedupeQuestions(value || []);
      },
    });

    Object.defineProperty(state, 'stats', {
      get() {
        return activeLibrary().stats;
      },
      set(value) {
        activeLibrary().stats = value || {};
      },
    });

    function loadJson(key, fallback) {
      try {
        const value = JSON.parse(localStorage.getItem(key) || 'null');
        return value || fallback;
      } catch {
        return fallback;
      }
    }

    function makeLibraryId(name) {
      let hash = 2166136261;
      const input = normalizeText(name) || '默认题库';
      for (let i = 0; i < input.length; i += 1) {
        hash ^= input.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return `lib_${(hash >>> 0).toString(16).padStart(8, '0')}`;
    }

    function makeLibrary(name, bank = [], stats = {}) {
      const libraryName = normalizeText(name) || '默认题库';
      return {
        id: makeLibraryId(libraryName),
        name: libraryName,
        bank: dedupeQuestions(bank),
        stats: stats || {},
      };
    }

    function loadInitialData() {
      const saved = loadJson(LIBRARIES_KEY, null);
      if (saved?.libraries?.length) {
        const libraries = saved.libraries.map((item) => makeLibrary(
          item.name || '默认题库',
          item.bank || [],
          item.stats || {},
        ));
        const activeLibraryId = libraries.some((item) => item.id === saved.activeLibraryId)
          ? saved.activeLibraryId
          : libraries[0].id;
        return { activeLibraryId, libraries };
      }
      const oldBank = loadJson(STORE_KEY, []);
      const oldStats = loadJson(STATS_KEY, {});
      const oldLibrary = makeLibrary('默认题库', oldBank, oldStats);
      return {
        activeLibraryId: oldLibrary.id,
        libraries: [oldLibrary],
      };
    }

    function activeLibrary() {
      let library = state.libraries.find((item) => item.id === state.activeLibraryId);
      if (!library) {
        library = state.libraries[0] || makeLibrary('默认题库');
        if (!state.libraries.length) state.libraries.push(library);
        state.activeLibraryId = library.id;
      }
      return library;
    }

    function findOrCreateLibrary(name) {
      const libraryName = normalizeText(name) || '默认题库';
      let library = state.libraries.find((item) => item.name === libraryName);
      if (!library) {
        library = makeLibrary(libraryName);
        state.libraries.push(library);
      }
      return library;
    }

    function libraryNameFromQuestion(item) {
      return normalizeText(item.courseName || item.libraryName || item.source || '默认题库');
    }

    function persistLibraries() {
      localStorage.setItem(LIBRARIES_KEY, JSON.stringify(buildDataFilePayload()));
      localStorage.setItem(STORE_KEY, JSON.stringify(state.bank));
      localStorage.setItem(STATS_KEY, JSON.stringify(state.stats));
    }

    function save() {
      persistLibraries();
      render();
    }

    function buildDataFilePayload() {
      return {
        version: 2,
        savedAt: new Date().toISOString(),
        activeLibraryId: state.activeLibraryId,
        libraries: state.libraries,
      };
    }

    function applyDataFilePayload(data) {
      if (data?.libraries) {
        state.libraries = data.libraries.map((item) => makeLibrary(
          item.name || '默认题库',
          item.bank || [],
          item.stats || {},
        ));
        state.activeLibraryId = data.activeLibraryId || state.libraries[0]?.id;
      } else {
        const bank = Array.isArray(data) ? data : data.bank;
        const stats = Array.isArray(data) ? {} : (data.stats || {});
        const library = makeLibrary('默认题库', bank || [], stats);
        state.libraries = [library];
        state.activeLibraryId = library.id;
      }
      if (!state.libraries.length) {
        const library = makeLibrary('默认题库');
        state.libraries = [library];
        state.activeLibraryId = library.id;
      }
      if (!state.libraries.some((item) => item.id === state.activeLibraryId)) {
        state.activeLibraryId = state.libraries[0].id;
      }
      persistLibraries();
      render();
    }

    function normalizeText(text) {
      return String(text || '').replace(/\u00a0/g, ' ').replace(/\s+/g, ' ').trim();
    }

    function makeId(item) {
      const optionTexts = (item.options || [])
        .map((option) => normalizeText(option.text || option.raw || option))
        .filter(Boolean)
        .sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'));
      const input = [normalizeText(item.type), normalizeText(item.question), optionTexts.join('|')].join('\n');
      let hash = 2166136261;
      for (let i = 0; i < input.length; i += 1) {
        hash ^= input.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return `q_${(hash >>> 0).toString(16).padStart(8, '0')}`;
    }

    function normalizeQuestion(item) {
      const options = Array.isArray(item.options)
        ? item.options
        : parseOptionsText(item.options);
      const type = normalizeText(item.type) || '题目';
      const normalizedOptions = /判断/.test(type) && !options.length
        ? [
          { key: 'A', text: '对', raw: 'A. 对' },
          { key: 'B', text: '错', raw: 'B. 错' },
        ]
        : options;
      const mappedOptions = normalizedOptions.map((option, index) => ({
        key: normalizeText(option.key || String.fromCharCode(65 + index)).toUpperCase(),
        text: normalizeText(option.text || option.raw || option),
        raw: normalizeText(option.raw || `${option.key || String.fromCharCode(65 + index)}. ${option.text || option}`),
      })).filter((option) => option.text);
      let correctAnswer = normalizeText(item.correctAnswer);
      if (/判断/.test(type) && /^[A-Z]$/i.test(correctAnswer)) {
        const option = mappedOptions.find((entry) => entry.key === correctAnswer.toUpperCase());
        if (option?.text) correctAnswer = option.text;
      }
      const normalized = {
        legacyId: item.legacyId || item.id || '',
        libraryName: libraryNameFromQuestion(item),
        source: normalizeText(item.source),
        section: normalizeText(item.section),
        number: normalizeText(item.number),
        type,
        score: item.score === '' || item.score == null ? null : Number(item.score),
        question: normalizeText(item.question),
        options: mappedOptions,
        myAnswer: normalizeText(item.myAnswer),
        correctAnswer,
        analysis: normalizeText(item.analysis),
        pageUrl: normalizeText(item.pageUrl),
        capturedAt: normalizeText(item.capturedAt),
      };
      normalized.id = makeId(normalized);
      return normalized;
    }

    function parseOptionsText(text) {
      const raw = String(text || '').trim();
      if (!raw) return [];
      return raw.split(/\r?\n/).map((line, index) => {
        const match = normalizeText(line).match(/^([A-Z])\s*[.．、]\s*(.*)$/i);
        return {
          key: match ? match[1].toUpperCase() : String.fromCharCode(65 + index),
          text: match ? match[2] : line,
          raw: line,
        };
      });
    }

    function mergeIntoBank(items) {
      const groups = new Map();
      items.map(normalizeQuestion).filter((item) => item.question).forEach((item) => {
        const name = item.libraryName || libraryNameFromQuestion(item);
        if (!groups.has(name)) groups.set(name, []);
        groups.get(name).push(item);
      });

      let added = 0;
      let updated = 0;
      const touched = [];
      groups.forEach((questions, name) => {
        const library = findOrCreateLibrary(name);
        const map = new Map(dedupeQuestions(library.bank).map((item) => [item.id, item]));
        questions.forEach((item) => {
          const old = map.get(item.id);
          if (!old) {
            map.set(item.id, item);
            added += 1;
            return;
          }
          map.set(item.id, { ...old, ...item });
          updated += 1;
        });
        library.bank = Array.from(map.values());
        touched.push(`${name} ${library.bank.length}题`);
      });

      if (groups.size) {
        const firstName = groups.keys().next().value;
        state.activeLibraryId = findOrCreateLibrary(firstName).id;
      }

      if (!groups.size) {
        setStatus('没有可导入的题目。');
        render();
        return;
      }

      setStatus(`导入完成：新增 ${added} 题，更新 ${updated} 题。${touched.join('；')}`);
      save();
    }

    function loadAiSettings() {
      const settings = loadJson(AI_SETTINGS_KEY, {});
      els.aiApiBase.value = settings.apiBase || els.aiApiBase.value || 'https://api.openai.com/v1';
      els.aiModel.value = settings.model || els.aiModel.value || 'gpt-4o-mini';
      els.aiCount.value = settings.count || els.aiCount.value || 5;
      els.aiType.value = settings.type || els.aiType.value || 'auto';
    }

    function saveAiSettings() {
      localStorage.setItem(AI_SETTINGS_KEY, JSON.stringify({
        apiBase: normalizeText(els.aiApiBase.value) || 'https://api.openai.com/v1',
        model: normalizeText(els.aiModel.value) || 'gpt-4o-mini',
        count: Math.max(1, Math.min(30, Math.floor(Number(els.aiCount.value) || 5))),
        type: els.aiType.value || 'auto',
      }));
    }

    function setAiStatus(text) {
      els.aiStatus.textContent = text;
    }

    function aiChatUrl(apiBase) {
      const base = normalizeText(apiBase).replace(/\/+$/, '');
      return /\/chat\/completions$/.test(base) ? base : `${base}/chat/completions`;
    }

    function sampleBankForAi() {
      return state.bank.slice(0, 80).map((item) => ({
        type: item.type,
        question: item.question,
        options: (item.options || []).map((option) => `${option.key}. ${option.text}`),
        correctAnswer: item.correctAnswer,
        analysis: item.analysis,
        source: item.source,
      }));
    }

    function typeSummaryForAi() {
      return getTypes().map((type) => `${type}:${state.bank.filter((item) => item.type === type).length}`).join('，') || '未知';
    }

    function buildAiPrompt(count, typePreference) {
      const library = activeLibrary();
      const typeInstruction = typePreference === 'auto'
        ? '题型比例尽量贴近样本题库。'
        : `只生成题型为“${typePreference}”的题目。`;
      return `当前题库名称：${library.name}\n当前题库题量：${state.bank.length}\n题型分布：${typeSummaryForAi()}\n任务：请先根据样本题归纳课程知识范围、难度和常见考法，然后扩展生成 ${count} 道新题。${typeInstruction}\n要求：\n1. 新题必须围绕样本题体现出的知识点，不要编造与课程无关的内容。\n2. 题干不要与样本题重复，但考点可以相近。\n3. 单选题给 4 个选项，正确答案用 A/B/C/D；多选题正确答案用 ABCD 这类字母组合；判断题必须给 A 对、B 错两个选项，但 correctAnswer 字段必须直接写“对”或“错”，不要写 A/B；填空题给可接受答案；简答题给参考答案和解析。\n4. 只返回 JSON，不要 Markdown，不要代码块。\nJSON 结构：{ "scope": "归纳出的考试范围", "questions": [{ "type": "单选题", "question": "题干", "options": [{"key":"A","text":"选项"}], "correctAnswer": "A", "analysis": "解析" }] }\n样本题：\n${JSON.stringify(sampleBankForAi(), null, 2)}`;
    }

    function parseAiResponse(text) {
      const cleaned = String(text || '').trim().replace(/^```(?:json)?\s*/i, '').replace(/```$/i, '').trim();
      try {
        return JSON.parse(cleaned);
      } catch {
        const start = cleaned.indexOf('{');
        const end = cleaned.lastIndexOf('}');
        if (start >= 0 && end > start) return JSON.parse(cleaned.slice(start, end + 1));
        throw new Error('AI 返回内容不是有效 JSON');
      }
    }

    function aiLibraryName(baseName) {
      const name = normalizeText(baseName) || '默认题库';
      return name.endsWith(' - AI扩展') ? name : `${name} - AI扩展`;
    }

    function normalizeAiGeneratedQuestions(payload, baseLibraryName) {
      const targetLibraryName = aiLibraryName(baseLibraryName);
      const questions = Array.isArray(payload?.questions) ? payload.questions : [];
      return questions.map((item) => ({
        libraryName: targetLibraryName,
        source: `AI扩展 - ${normalizeText(baseLibraryName) || '默认题库'}`,
        section: payload?.scope ? `AI范围：${normalizeText(payload.scope)}` : 'AI扩展',
        type: normalizeText(item.type) || '单选题',
        question: normalizeText(item.question),
        options: Array.isArray(item.options) ? item.options : [],
        correctAnswer: normalizeText(item.correctAnswer),
        analysis: normalizeText(item.analysis),
        capturedAt: new Date().toISOString(),
      })).filter((item) => item.question && item.correctAnswer);
    }

    async function generateAiQuestions() {
      if (!state.bank.length) {
        setAiStatus('当前题库为空，先导入一些题目再扩展。');
        return;
      }
      const apiKey = normalizeText(els.aiApiKey.value);
      const model = normalizeText(els.aiModel.value);
      const apiBase = normalizeText(els.aiApiBase.value);
      const count = Math.max(1, Math.min(30, Math.floor(Number(els.aiCount.value) || 5)));
      const typePreference = els.aiType.value || 'auto';
      const baseLibraryName = activeLibrary().name;
      if (!apiBase || !model || !apiKey) {
        setAiStatus('请填写接口地址、模型和 API Key。');
        return;
      }

      saveAiSettings();
      els.aiGenerateBtn.disabled = true;
      setAiStatus('正在分析题库并生成新题，请稍等...');
      try {
        const response = await fetch(aiChatUrl(apiBase), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${apiKey}`,
          },
          body: JSON.stringify({
            model,
            temperature: 0.7,
            messages: [
              { role: 'system', content: '你是严谨的课程题库扩展助手，只输出可解析 JSON。' },
              { role: 'user', content: buildAiPrompt(count, typePreference) },
            ],
          }),
        });
        const raw = await response.text();
        if (!response.ok) throw new Error(`接口返回 ${response.status}：${raw.slice(0, 180)}`);
        const data = JSON.parse(raw);
        const content = data.choices?.[0]?.message?.content || data.output_text || '';
        const payload = parseAiResponse(content);
        const generated = normalizeAiGeneratedQuestions(payload, baseLibraryName);
        if (!generated.length) throw new Error('AI 没有返回可导入的题目');
        mergeIntoBank(generated);
        setAiStatus(`已生成 ${generated.length} 题，已保存到“${aiLibraryName(baseLibraryName)}”。范围：${normalizeText(payload.scope) || '未提供'}`);
      } catch (error) {
        setAiStatus(`AI 生题失败：${error.message}`);
      } finally {
        els.aiGenerateBtn.disabled = false;
      }
    }
    function receiveSharedQuestionBank(event) {
      const data = event.data;
      if (!data || data.type !== 'cx-question-bank-import') return;
      const incoming = Array.isArray(data.bank) ? data.bank : [];
      if (!incoming.length) {
        setStatus('收到共享数据，但里面没有题目。');
        return;
      }
      mergeIntoBank(incoming);
      setStatus(`已从油猴脚本接收 ${incoming.length} 题。`);
      event.source?.postMessage({
        type: 'cx-question-bank-import-ack',
        received: incoming.length,
        total: state.bank.length,
      }, event.origin || '*');
    }

    function dedupeQuestions(items) {
      const map = new Map();
      (items || []).map(normalizeQuestion).filter((item) => item.question).forEach((item) => {
        const old = map.get(item.id);
        if (!old) {
          map.set(item.id, item);
          return;
        }
        map.set(item.id, {
          ...old,
          ...item,
          myAnswer: item.myAnswer || old.myAnswer,
          correctAnswer: item.correctAnswer || old.correctAnswer,
          analysis: item.analysis || old.analysis,
          source: item.source || old.source,
          section: item.section || old.section,
        });
      });
      return Array.from(map.values());
    }

    async function readFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(reader.error);
        reader.readAsText(file, 'utf-8');
      });
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let field = '';
      let inQuotes = false;
      const input = text.replace(/^\uFEFF/, '');

      for (let i = 0; i < input.length; i += 1) {
        const char = input[i];
        const next = input[i + 1];
        if (inQuotes) {
          if (char === '"' && next === '"') {
            field += '"';
            i += 1;
          } else if (char === '"') {
            inQuotes = false;
          } else {
            field += char;
          }
        } else if (char === '"') {
          inQuotes = true;
        } else if (char === ',') {
          row.push(field);
          field = '';
        } else if (char === '\n') {
          row.push(field);
          rows.push(row);
          row = [];
          field = '';
        } else if (char !== '\r') {
          field += char;
        }
      }
      row.push(field);
      rows.push(row);

      const headers = rows.shift()?.map((item) => item.trim()) || [];
      return rows
        .filter((item) => item.some((cell) => cell.trim()))
        .map((cells) => Object.fromEntries(headers.map((header, index) => [header, cells[index] || ''])));
    }

    function getTypes() {
      return Array.from(new Set(state.bank.map((item) => item.type).filter(Boolean))).sort();
    }

    function getSources() {
      return Array.from(new Set(state.bank.map((item) => item.source || '未命名来源'))).sort();
    }

    function selectedTypes() {
      return Array.from(els.typeFilters.querySelectorAll('input:checked')).map((input) => input.value);
    }

    function getStat(item) {
      return state.stats[item.id] || { seen: 0, right: 0, wrong: 0, mastered: false };
    }

    function setQuestionStat(id, patch) {
      state.stats[id] = { seen: 0, right: 0, wrong: 0, mastered: false, ...(state.stats[id] || {}), ...patch };
      save();
    }

    function filteredBank() {
      const source = els.sourceFilter.value;
      const types = selectedTypes();
      const keyword = normalizeText(els.searchInput.value).toLowerCase();
      return state.bank.filter((item) => {
        if (source !== '__all__' && (item.source || '未命名来源') !== source) return false;
        if (types.length && !types.includes(item.type)) return false;
        if (els.mode.value === 'wrong' && getStat(item).wrong <= 0) return false;
        if (els.mode.value === 'unseen' && getStat(item).seen > 0) return false;
        if (keyword) {
          const haystack = [item.question, item.correctAnswer, item.analysis, item.options.map((option) => option.raw).join(' ')].join(' ').toLowerCase();
          if (!haystack.includes(keyword)) return false;
        }
        return true;
      });
    }

    function pickRandom() {
      exitExam(false);
      let pool = filteredBank();
      if (!pool.length && els.mode.value === 'unseen') {
        els.mode.value = 'all';
        pool = filteredBank();
        setStatus('未练题已经刷完，已切换到全部题目。');
      }
      if (!pool.length) {
        setStatus('当前筛选范围没有题目。');
        return;
      }
      const index = Math.floor(Math.random() * pool.length);
      showQuestion(pool[index]);
    }

    function showQuestion(item) {
      state.current = item;
      const paper = currentPaper();
      const saved = state.exam.active ? paper.answers[item.id] : null;
      state.selected = new Set(normalizedSelectedKeys(item, saved?.selected || []));
      els.empty.classList.add('hidden');
      if (state.viewMode === 'single') els.paperPreview.classList.add('hidden');
      els.quiz.classList.remove('hidden');
      els.typeBadge.textContent = `${item.type}${item.examScore || item.score ? ` / ${formatScore(questionScore(item))}分` : ''}`;
      els.sourceBadge.textContent = item.source || '未命名来源';
      els.progressBadge.textContent = state.exam.active
        ? `第 ${state.exam.paperIndex + 1} 套 · ${state.exam.index + 1} / ${paper.questions.length}`
        : `${state.bank.findIndex((q) => q.id === item.id) + 1} / ${state.bank.length}`;
      els.questionText.textContent = item.question;
      els.result.textContent = '';
      els.result.className = 'result';
      els.answerBox.className = 'answer-box';
      els.answerBox.innerHTML = '';
      renderOptions(item);
      if (saved?.text) els.textAnswer.value = saved.text;
      updateOptionSelection();
      if (paper.submitted) {
        showAnswer();
        paintOptionResult(item);
        const result = paper.results[item.id];
        if (result) {
          els.result.textContent = result.pending
            ? `待自评：${formatScore(result.score)} / ${formatScore(result.fullScore)} 分`
            : `${result.ok ? '正确' : '错误'}：${formatScore(result.score)} / ${formatScore(result.fullScore)} 分`;
          els.result.className = `result ${result.ok ? 'ok' : 'bad'}`;
        }
      }
    }

    function renderOptions(item) {
      els.options.innerHTML = '';
      const isChoice = item.options.length > 0;
      els.textAnswer.classList.toggle('hidden', isChoice);
      els.checkBtn.disabled = !canAutoCheck(item);
      els.checkBtn.textContent = canAutoCheck(item) ? '提交判断' : '主观题自评';

      if (!isChoice) {
        els.textAnswer.value = '';
        return;
      }

      item.options.forEach((option) => {
        const button = document.createElement('button');
        button.className = 'option';
        button.type = 'button';
        button.dataset.key = option.key;
        button.innerHTML = `<span class="key">${escapeHtml(option.key)}</span><span>${escapeHtml(option.text)}</span>`;
        button.addEventListener('click', () => {
          if (isMultiChoice(item)) {
            if (state.selected.has(option.key)) state.selected.delete(option.key);
            else state.selected.add(option.key);
          } else {
            state.selected = new Set([option.key]);
          }
          saveCurrentAnswer();
          updateOptionSelection();
        });
        els.options.appendChild(button);
      });
    }

    function isMultiChoice(item) {
      return /多选/.test(item?.type || '');
    }

    function canAutoCheck(item) {
      if (/简答|论述|问答/.test(item.type)) return false;
      return Boolean(normalizeAnswer(item.correctAnswer) || item.correctAnswer);
    }

    function clampCurrentSelection() {
      if (!state.current) return;
      state.selected = new Set(normalizedSelectedKeys(state.current, Array.from(state.selected)));
    }

    function updateOptionSelection() {
      clampCurrentSelection();
      els.options.querySelectorAll('.option').forEach((button) => {
        button.classList.toggle('selected', state.selected.has(button.dataset.key));
      });
    }

    function normalizeAnswer(answer) {
      const text = normalizeText(answer)
        .replace(/（/g, '(')
        .replace(/）/g, ')')
        .replace(/\(\s*\)/g, '()');
      const letters = text.match(/[A-Z]/gi);
      if (/^[A-Z\s,;、，]+$/.test(text) && letters) {
        return Array.from(new Set(letters.map((letter) => letter.toUpperCase()))).sort().join('');
      }
      if (/^(对|正确|true)$/i.test(text)) return '对';
      if (/^(错|错误|false)$/i.test(text)) return '错';
      return text.toLowerCase();
    }

    function answerVariants(answer) {
      const normalized = normalizeAnswer(answer);
      if (!normalized) return [];
      const variants = new Set([normalized]);
      if (/^[a-z_$][\w$]*\(\)$/i.test(normalized)) {
        variants.add(normalized.replace(/\(\)$/, ''));
      } else if (/^[a-z_$][\w$]*$/i.test(normalized)) {
        variants.add(`${normalized}()`);
      }
      return Array.from(variants);
    }

    function selectedAnswer() {
      clampCurrentSelection();
      if (state.selected.size) return answerFromSelection(state.current, Array.from(state.selected));
      return normalizeText(els.textAnswer.value);
    }

    function answerFromSelection(item, selectedKeys) {
      const keys = [...selectedKeys].sort();
      if (/判断/.test(item?.type || '') && keys.length === 1) {
        const option = item.options.find((entry) => entry.key === keys[0]);
        return normalizeText(option?.text || keys[0]);
      }
      return keys.join('');
    }

    function roundScore(value) {
      return Number((Number(value) || 0).toFixed(2));
    }

    function formatScore(value) {
      const rounded = roundScore(value);
      return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(2).replace(/0+$/, '').replace(/\.$/, '');
    }

    function questionScore(item) {
      return roundScore(item.examScore || item.score || 1);
    }

    function paperTotalScore(questions) {
      return roundScore((questions || []).reduce((sum, item) => sum + questionScore(item), 0));
    }
    function currentPaper() {
      return state.exam.papers[state.exam.paperIndex] || {
        questions: [],
        answers: {},
        results: {},
        submitted: false,
      };
    }

    function saveCurrentAnswer() {
      if (!state.exam.active || !state.current) return;
      const paper = currentPaper();
      paper.answers[state.current.id] = {
        selected: normalizedSelectedKeys(state.current, Array.from(state.selected)),
        text: normalizeText(els.textAnswer.value),
      };
    }

    function setViewMode(mode) {
      state.viewMode = mode;
      els.singleModeBtn.classList.toggle('active', mode === 'single');
      els.paperModeBtn.classList.toggle('active', mode === 'paper');
      els.viewHint.textContent = mode === 'single' ? '当前为单题练习' : '当前为全卷预览';
      if (mode === 'paper') {
        saveCurrentAnswer();
        if (!state.exam.active) {
          setStatus('全卷预览需要先生成模拟卷。');
          state.viewMode = 'single';
          els.singleModeBtn.classList.add('active');
          els.paperModeBtn.classList.remove('active');
          els.viewHint.textContent = '当前为单题练习';
          els.paperPreview.classList.add('hidden');
          return;
        }
        els.quiz.classList.add('hidden');
        els.empty.classList.add('hidden');
        renderPaperPreview();
        els.paperPreview.classList.remove('hidden');
      } else {
        collectPaperAnswers();
        els.paperPreview.classList.add('hidden');
        if (state.current) {
          showQuestion(state.current);
        } else if (state.exam.active && currentPaper().questions.length) {
          showQuestion(currentPaper().questions[state.exam.index]);
        }
      }
    }

    function normalizedSelectedKeys(item, selected = []) {
      const keys = Array.from(new Set((selected || []).filter(Boolean)));
      return isMultiChoice(item) ? keys : keys.slice(-1);
    }
    function answerFor(item) {
      return currentPaper().answers[item.id] || { selected: [], text: '' };
    }

    function isAnswered(item) {
      const answer = answerFor(item);
      return Boolean(answer.text || answer.selected.length);
    }

    function collectPaperAnswers() {
      if (!state.exam.active || els.paperPreview.classList.contains('hidden')) return;
      const paper = currentPaper();
      paper.questions.forEach((item) => {
        const root = Array.from(els.paperPreview.querySelectorAll('.paper-question'))
          .find((node) => node.dataset.questionId === item.id);
        if (!root) return;
        let selected = Array.from(root.querySelectorAll('.paper-option.selected')).map((button) => button.dataset.key);
        selected = normalizedSelectedKeys(item, selected);
        const textarea = root.querySelector('textarea');
        paper.answers[item.id] = {
          selected,
          text: normalizeText(textarea?.value || ''),
        };
      });
    }

    function groupedPaperQuestions() {
      const groups = [];
      currentPaper().questions.forEach((item, index) => {
        const title = item.type || '题目';
        let group = groups[groups.length - 1];
        if (!group || group.title !== title) {
          group = { title, items: [] };
          groups.push(group);
        }
        group.items.push({ item, index });
      });
      return groups;
    }

    function renderPaperPreview() {
      if (!state.exam.active) return;
      const paper = currentPaper();
      const total = paperTotalScore(paper.questions);
      els.paperPreview.innerHTML = `
        <div class="paper-preview">
          <div class="paper-content">
            ${groupedPaperQuestions().map((group) => `
              <h2 class="paper-section-title">${escapeHtml(group.title)}（共 ${group.items.length} 题）</h2>
              ${group.items.map(({ item, index }) => renderPaperQuestion(item, index)).join('')}
            `).join('')}
          </div>
          <aside class="paper-card">
            <h3>答题卡</h3>
            <div class="status">第 ${state.exam.paperIndex + 1} 套 / 共 ${state.exam.papers.length} 套，共 ${paper.questions.length} 题，${formatScore(total)} 分</div>
            ${groupedPaperQuestions().map((group) => `
              <div class="answer-card-section">
                <strong>${escapeHtml(group.title)}</strong>
                <div class="answer-grid">
                  ${group.items.map(({ item, index }) => renderAnswerCardButton(item, index)).join('')}
                </div>
              </div>
            `).join('')}
          </aside>
        </div>
      `;
      bindPaperPreviewEvents();
    }

    function renderPaperQuestion(item, index) {
      const answer = answerFor(item);
      const result = currentPaper().results[item.id];
      const resultText = result
        ? `<div class="result ${result.ok ? 'ok' : 'bad'}">${result.pending ? '待自评' : (result.ok ? '正确' : '错误')}：${formatScore(result.score)} / ${formatScore(result.fullScore)} 分</div>`
        : '';
      const answerBox = currentPaper().submitted
        ? `<div class="answer-box show"><p class="answer-line"><strong>正确答案：</strong>${escapeHtml(displayCorrectAnswer(item))}</p>${item.analysis ? `<p class="answer-line"><strong>解析：</strong>${escapeHtml(item.analysis)}</p>` : ''}</div>`
        : '';
      return `
        <div class="paper-question" id="paper-q-${index}" data-question-id="${escapeHtml(item.id)}">
          <div class="paper-question-title">${index + 1}. <span class="badge">${escapeHtml(item.type)} / ${escapeHtml(formatScore(questionScore(item)))}分</span> ${escapeHtml(item.question)}</div>
          ${item.options.length ? item.options.map((option) => {
            const selectedKeys = normalizedSelectedKeys(item, answer.selected);
            return `
            <button type="button" class="paper-option ${selectedKeys.includes(option.key) ? 'selected' : ''}" data-key="${escapeHtml(option.key)}">
              <span class="key">${escapeHtml(option.key)}</span>
              <span>${escapeHtml(option.text)}</span>
            </button>
          `;
          }).join('') : `<textarea placeholder="输入你的答案">${escapeHtml(answer.text)}</textarea>`}
          ${resultText}
          ${answerBox}
        </div>
      `;
    }

    function renderAnswerCardButton(item, index) {
      const result = currentPaper().results[item.id];
      const cls = result ? (result.pending ? 'answered' : (result.ok ? 'ok' : 'wrong')) : (isAnswered(item) ? 'answered' : '');
      return `<button type="button" class="${cls}" data-card-index="${index}">${index + 1}</button>`;
    }

    function bindPaperPreviewEvents() {
      els.paperPreview.querySelectorAll('.paper-option').forEach((button) => {
        button.addEventListener('click', () => {
          const root = button.closest('.paper-question');
          const item = currentPaper().questions[Number(root.id.replace('paper-q-', ''))];
          if (currentPaper().submitted) return;
          if (isMultiChoice(item)) {
            button.classList.toggle('selected');
          } else {
            root.querySelectorAll('.paper-option').forEach((option) => option.classList.remove('selected'));
            button.classList.add('selected');
          }
          collectPaperAnswers();
          renderAnswerCardOnly();
        });
      });
      els.paperPreview.querySelectorAll('[data-card-index]').forEach((button) => {
        button.addEventListener('click', () => {
          const index = Number(button.dataset.cardIndex);
          els.paperPreview.querySelector(`#paper-q-${index}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
      els.paperPreview.querySelectorAll('textarea').forEach((textarea) => {
        textarea.addEventListener('input', () => {
          collectPaperAnswers();
          renderAnswerCardOnly();
        });
      });
    }

    function renderAnswerCardOnly() {
      const card = els.paperPreview.querySelector('.paper-card');
      if (!card) return;
      const paper = currentPaper();
      const total = paperTotalScore(paper.questions);
      card.innerHTML = `
        <h3>答题卡</h3>
        <div class="status">第 ${state.exam.paperIndex + 1} 套 / 共 ${state.exam.papers.length} 套，共 ${paper.questions.length} 题，${formatScore(total)} 分</div>
        ${groupedPaperQuestions().map((group) => `
          <div class="answer-card-section">
            <strong>${escapeHtml(group.title)}</strong>
            <div class="answer-grid">
              ${group.items.map(({ item, index }) => renderAnswerCardButton(item, index)).join('')}
            </div>
          </div>
        `).join('')}
      `;
      card.querySelectorAll('[data-card-index]').forEach((button) => {
        button.addEventListener('click', () => {
          const index = Number(button.dataset.cardIndex);
          els.paperPreview.querySelector(`#paper-q-${index}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
    }

    function getExamConfig() {
      return [
        { label: '单选题', pattern: /单选/, countInput: els.examSingleCount, scoreInput: els.examSingleScore, count: readNumber(els.examSingleCount), score: readNumber(els.examSingleScore) },
        { label: '多选题', pattern: /多选/, countInput: els.examMultiCount, scoreInput: els.examMultiScore, count: readNumber(els.examMultiCount), score: readNumber(els.examMultiScore) },
        { label: '判断题', pattern: /判断/, countInput: els.examJudgeCount, scoreInput: els.examJudgeScore, count: readNumber(els.examJudgeCount), score: readNumber(els.examJudgeScore) },
        { label: '填空题', pattern: /填空/, countInput: els.examFillCount, scoreInput: els.examFillScore, count: readNumber(els.examFillCount), score: readNumber(els.examFillScore) },
        { label: '简答题', pattern: /简答|问答|论述/, countInput: els.examShortCount, scoreInput: els.examShortScore, count: readNumber(els.examShortCount), score: readNumber(els.examShortScore) },
      ];
    }

    function currentExamBase() {
      const source = els.sourceFilter.value;
      return state.bank.filter((item) => source === '__all__' || (item.source || '未命名来源') === source);
    }

    function syncExamConfigAvailability() {
      const base = currentExamBase();
      getExamConfig().forEach((config) => {
        const available = base.filter((item) => config.pattern.test(item.type)).length;
        config.available = available;
        config.countInput.max = String(available);
        config.countInput.title = available ? `当前可用 ${available} 题` : '当前题库没有这种题型，组卷时会自动跳过';
        config.scoreInput.title = config.countInput.title;
        if (!available) {
          config.countInput.value = '0';
          config.countInput.disabled = true;
          config.scoreInput.disabled = true;
          return;
        }
        config.countInput.disabled = false;
        config.scoreInput.disabled = false;
        if (readNumber(config.countInput) > available) config.countInput.value = String(available);
      });
    }

    function prepareExamConfigs(base) {
      const missing = [];
      const configs = getExamConfig().map((config) => {
        const available = base.filter((item) => config.pattern.test(item.type)).length;
        const requested = config.count;
        const count = available ? Math.min(requested, available) : 0;
        if (available && requested > available) missing.push(`${config.label} 只有 ${available} 题，已按 ${available} 题组卷`);
        return { ...config, available, requested, count };
      }).filter((config) => config.count > 0);
      const rawScore = configs.reduce((sum, config) => sum + config.count * config.score, 0);
      const scale = rawScore > 0 ? 100 / rawScore : 1;
      configs.forEach((config) => {
        config.examScore = Number((config.score * scale).toFixed(2));
      });
      return { configs, missing, rawScore };
    }

    function readNumber(input) {
      const value = Number(input.value);
      return Number.isFinite(value) && value > 0 ? value : 0;
    }

    function shuffled(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function normalizePaperScore(questions, target = 100) {
      if (!questions.length) return questions;
      const total = paperTotalScore(questions);
      const diff = Number((target - total).toFixed(2));
      if (Math.abs(diff) >= 0.01) {
        const last = questions[questions.length - 1];
        last.examScore = Number((Number(last.examScore || last.score || 1) + diff).toFixed(2));
      }
      return questions;
    }

    function generateExam() {
      if (!state.bank.length) {
        setExamStatus('请先导入题库。');
        return;
      }
      syncExamConfigAvailability();
      const base = currentExamBase();
      const setCount = Math.max(1, Math.floor(readNumber(els.examSetCount) || 1));
      const { configs, missing, rawScore } = prepareExamConfigs(base);
      const papers = [];

      function buildPaper() {
        const questions = [];

        configs.forEach((config) => {
          if (!config.count) return;
          const pool = base.filter((item) => config.pattern.test(item.type));
          const picked = shuffled(pool).slice(0, config.count).map((item) => ({
            ...item,
            examScore: config.examScore || config.score || item.score || 1,
          }));
          questions.push(...picked);
        });

        return {
          questions: normalizePaperScore(questions),
          answers: {},
          results: {},
          submitted: false,
        };
      }

      configs.forEach((config) => {
        const pool = base.filter((item) => config.pattern.test(item.type));
        if (pool.length && pool.length === config.count && setCount > 1) missing.push(`${config.label} 题量刚好等于配置，多套之间会重复`);
      });

      for (let i = 0; i < setCount; i += 1) {
        const paper = buildPaper();
        if (paper.questions.length) papers.push(paper);
      }

      if (!papers.length || !papers[0].questions.length) {
        setExamStatus('没有符合配置的题目。');
        return;
      }

      state.exam = {
        active: true,
        paperIndex: 0,
        index: 0,
        papers,
      };
      els.examSummary.className = 'summary';
      updateExamButtons();
      const actualCount = papers[0].questions.length;
      const actualScore = paperTotalScore(papers[0].questions);
      setExamStatus(`已生成 ${papers.length} 套模拟卷，每套 ${actualCount} 题，共 ${formatScore(actualScore)} 分。${rawScore && rawScore !== actualScore ? ` 已按实际题型从 ${formatScore(rawScore)} 分折算到 100 分。` : ''}当前第 1 套。${missing.length ? ` ${missing.join('，')}。` : ''}`);
      if (state.viewMode === 'paper') {
        renderPaperPreview();
        els.paperPreview.classList.remove('hidden');
        els.quiz.classList.add('hidden');
        els.empty.classList.add('hidden');
      } else {
        showQuestion(currentPaper().questions[0]);
      }
    }

    function showExamQuestion(index) {
      if (!state.exam.active) return;
      saveCurrentAnswer();
      const paper = currentPaper();
      state.exam.index = Math.max(0, Math.min(index, paper.questions.length - 1));
      if (state.viewMode === 'paper') {
        collectPaperAnswers();
        renderPaperPreview();
        els.paperPreview.querySelector(`#paper-q-${state.exam.index}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        showQuestion(paper.questions[state.exam.index]);
      }
      updateExamButtons();
    }

    function nextQuestion() {
      if (!state.exam.active) {
        pickRandom();
        return;
      }
      const nextIndex = state.exam.index + 1;
      if (nextIndex >= currentPaper().questions.length) {
        setExamStatus('已经是最后一题，可以提交改分。');
        return;
      }
      showExamQuestion(nextIndex);
    }

    function switchPaper(offset) {
      if (!state.exam.active) return;
      saveCurrentAnswer();
      const next = state.exam.paperIndex + offset;
      if (next < 0 || next >= state.exam.papers.length) return;
      state.exam.paperIndex = next;
      state.exam.index = 0;
      els.examSummary.className = currentPaper().submitted ? 'summary show' : 'summary';
      if (currentPaper().submitted) renderExamSummary();
      setExamStatus(`当前第 ${state.exam.paperIndex + 1} 套 / 共 ${state.exam.papers.length} 套。`);
      if (state.viewMode === 'paper') {
        renderPaperPreview();
      } else {
        showQuestion(currentPaper().questions[0]);
      }
      updateExamButtons();
    }

    function updateExamButtons() {
      const active = state.exam.active;
      els.submitExamBtn.disabled = !active;
      els.prevPaperBtn.disabled = !active || state.exam.paperIndex <= 0;
      els.nextPaperBtn.disabled = !active || state.exam.paperIndex >= state.exam.papers.length - 1;
    }

    function exitExam(ask = true) {
      if (!state.exam.active) return;
      if (ask && !confirm('确定退出当前模拟卷吗？当前作答不会保存为成绩。')) return;
      state.exam = {
        active: false,
        paperIndex: 0,
        index: 0,
        papers: [],
      };
      updateExamButtons();
      els.examSummary.className = 'summary';
      els.paperPreview.classList.add('hidden');
      els.quiz.classList.add('hidden');
      els.empty.classList.remove('hidden');
      setExamStatus('已退出模拟卷。');
    }

    function answerTextForKey(item, key) {
      const option = item?.options?.find((entry) => entry.key === normalizeText(key).toUpperCase());
      return normalizeText(option?.text || '');
    }

    function getAcceptedAnswers(answer, item = null) {
      const text = normalizeText(answer)
        .replace(/\(\d+\)/g, ' ')
        .replace(/（\d+）/g, ' ');
      const parts = text.split(/;|；|可接受:|可接受：|答案[:：]|,|，|\//)
        .map((entry) => normalizeText(entry))
        .filter(Boolean);
      const values = [text, ...parts];
      if (/判断/.test(item?.type || '')) {
        values.forEach((value) => {
          const optionText = answerTextForKey(item, value);
          if (optionText) values.push(optionText);
        });
      }
      return Array.from(new Set(values.flatMap(answerVariants).filter(Boolean)));
    }

    function displayCorrectAnswer(item) {
      const answer = normalizeText(item.correctAnswer);
      if (/判断/.test(item.type || '')) {
        const optionText = answerTextForKey(item, answer);
        if (optionText && normalizeAnswer(optionText) !== normalizeAnswer(answer)) return `${answer}（${optionText}）`;
      }
      return answer || '暂无';
    }

    function gradeQuestion(item) {
      const paper = currentPaper();
      const answer = paper.answers[item.id] || { selected: [], text: '' };
      const userRaw = answer.selected.length ? answerFromSelection(item, answer.selected) : answer.text;
      const user = normalizeAnswer(userRaw);
      const fullScore = questionScore(item);
      const subjective = /简答|问答|论述/.test(item.type);
      const accepted = getAcceptedAnswers(item.correctAnswer, item);
      const ok = Boolean(user) && accepted.includes(user);
      return {
        id: item.id,
        userAnswer: userRaw,
        correctAnswer: item.correctAnswer,
        fullScore,
        score: subjective ? 0 : (ok ? fullScore : 0),
        ok,
        pending: subjective,
      };
    }

    function submitExam() {
      if (!state.exam.active) return;
      collectPaperAnswers();
      saveCurrentAnswer();
      const paper = currentPaper();
      const results = {};
      paper.questions.forEach((item) => {
        results[item.id] = gradeQuestion(item);
        const stat = getStat(item);
        const result = results[item.id];
        setQuestionStat(item.id, {
          seen: stat.seen + 1,
          right: stat.right + (result.ok ? 1 : 0),
          wrong: stat.wrong + (!result.ok && !result.pending ? 1 : 0),
          mastered: result.ok ? stat.mastered : false,
        });
      });
      paper.results = results;
      paper.submitted = true;
      renderExamSummary();
      if (state.viewMode === 'paper') {
        renderPaperPreview();
      } else {
        showQuestion(paper.questions[state.exam.index]);
      }
      setExamStatus(`第 ${state.exam.paperIndex + 1} 套已提交改分，简答题按待自评处理。`);
    }

    function renderExamSummary() {
      const paper = currentPaper();
      const results = Object.values(paper.results);
      const total = roundScore(results.reduce((sum, item) => sum + item.fullScore, 0));
      const score = roundScore(results.reduce((sum, item) => sum + item.score, 0));
      const pending = results.filter((item) => item.pending).length;
      const wrongItems = paper.questions
        .map((item, index) => ({ item, index, result: paper.results[item.id] }))
        .filter((entry) => entry.result && !entry.result.ok && !entry.result.pending);
      els.examSummary.className = 'summary show';
      els.examSummary.innerHTML = `
        <div class="summary-head">
          <div>
            <div class="summary-score">${formatScore(score)} / ${formatScore(total)}</div>
            <div>第 ${state.exam.paperIndex + 1} 套 / 共 ${state.exam.papers.length} 套，${paper.questions.length} 题，错 ${wrongItems.length} 题，待自评 ${pending} 题</div>
          </div>
          <button id="reviewWrongBtn" class="soft" ${wrongItems.length ? '' : 'disabled'}>查看错题</button>
        </div>
        <div class="summary-list">
          ${paper.questions.map((item, index) => {
            const result = paper.results[item.id];
            const cls = result.pending ? 'pending' : (result.ok ? 'ok' : 'bad');
            return `<button class="${cls}" data-index="${index}">${index + 1}. ${escapeHtml(item.type)}</button>`;
          }).join('')}
        </div>
        <div id="examWrongReview" class="wrong-review hidden">
          <h3>本次错题</h3>
          ${wrongItems.map(({ item, index, result }) => `
            <button type="button" class="wrong-review-item" data-wrong-index="${index}">
              <strong>${index + 1}. ${escapeHtml(item.type)} · ${formatScore(result.score)} / ${formatScore(result.fullScore)} 分</strong>
              <span>${escapeHtml(item.question).slice(0, 120)}</span>
              <span>你的答案：${escapeHtml(result.userAnswer || '未作答')}；正确答案：${escapeHtml(result.correctAnswer || '暂无')}</span>
            </button>
          `).join('')}
        </div>
      `;
      els.examSummary.querySelectorAll('[data-index]').forEach((button) => {
        button.addEventListener('click', () => showExamQuestion(Number(button.dataset.index)));
      });
      els.examSummary.querySelector('#reviewWrongBtn').addEventListener('click', () => {
        const review = els.examSummary.querySelector('#examWrongReview');
        review.classList.toggle('hidden');
        if (!review.classList.contains('hidden')) review.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });
      els.examSummary.querySelectorAll('[data-wrong-index]').forEach((button) => {
        button.addEventListener('click', () => showExamQuestion(Number(button.dataset.wrongIndex)));
      });
    }

    function setExamStatus(text) {
      els.examStatus.textContent = text;
    }

    function checkCurrent() {
      if (!state.current) return;
      const item = state.current;
      clampCurrentSelection();
      saveCurrentAnswer();
      showAnswer();
      const user = normalizeAnswer(selectedAnswer());
      const accepted = getAcceptedAnswers(item.correctAnswer, item);
      const ok = Boolean(user) && accepted.includes(user);
      if (state.exam.active) {
        els.result.textContent = ok ? '当前题回答正确，提交模拟卷时会计分。' : `当前题回答错误，你的答案：${selectedAnswer() || '未作答'}`;
        els.result.className = `result ${ok ? 'ok' : 'bad'}`;
        paintOptionResult(item);
        return;
      }
      const stat = getStat(item);
      setQuestionStat(item.id, {
        seen: stat.seen + 1,
        right: stat.right + (ok ? 1 : 0),
        wrong: stat.wrong + (ok ? 0 : 1),
        mastered: ok ? stat.mastered : false,
      });
      els.result.textContent = ok ? '回答正确' : `回答错误，你的答案：${selectedAnswer() || '未作答'}`;
      els.result.className = `result ${ok ? 'ok' : 'bad'}`;
      paintOptionResult(item);
    }

    function paintOptionResult(item) {
      clampCurrentSelection();
      const right = normalizeAnswer(item.correctAnswer);
      const accepted = getAcceptedAnswers(item.correctAnswer, item);
      els.options.querySelectorAll('.option').forEach((button) => {
        const key = button.dataset.key;
        const option = item.options.find((entry) => entry.key === key);
        const selected = state.selected.has(key);
        const shouldBe = /判断/.test(item.type)
          ? accepted.includes(normalizeAnswer(option?.text || key))
          : right.includes(key);
        button.classList.toggle('correct', shouldBe);
        button.classList.toggle('wrong', selected && !shouldBe);
      });
    }

    function showAnswer() {
      if (!state.current) return;
      const item = state.current;
      els.answerBox.classList.add('show');
      els.answerBox.innerHTML = `
        <p class="answer-line"><strong>正确答案：</strong>${escapeHtml(displayCorrectAnswer(item))}</p>
        ${item.myAnswer ? `<p class="answer-line"><strong>原我的答案：</strong>${escapeHtml(item.myAnswer)}</p>` : ''}
        ${item.analysis ? `<p class="answer-line"><strong>解析：</strong>${escapeHtml(item.analysis)}</p>` : ''}
        ${item.section ? `<p class="answer-line"><strong>分组：</strong>${escapeHtml(item.section)}</p>` : ''}
      `;
    }

    function markWrong() {
      if (!state.current) return;
      const stat = getStat(state.current);
      setQuestionStat(state.current.id, { seen: stat.seen + 1, wrong: stat.wrong + 1, mastered: false });
      els.result.textContent = '已加入错题。';
      els.result.className = 'result bad';
      showAnswer();
    }

    function markRight() {
      if (!state.current) return;
      const stat = getStat(state.current);
      setQuestionStat(state.current.id, { seen: stat.seen + 1, right: stat.right + 1, mastered: true, wrong: 0 });
      els.result.textContent = '已标记掌握。';
      els.result.className = 'result ok';
      showAnswer();
    }

    function renderLibraries() {
      const current = activeLibrary();
      els.librarySelect.innerHTML = '';
      state.libraries.forEach((library) => {
        const option = document.createElement('option');
        option.value = library.id;
        option.textContent = `${library.name}（${library.bank.length}题）`;
        els.librarySelect.appendChild(option);
      });
      els.librarySelect.value = current.id;
      els.deleteLibraryBtn.disabled = state.libraries.length <= 1;
    }

    function switchLibrary(id) {
      if (!state.libraries.some((item) => item.id === id)) return;
      if (state.exam.active) exitExam(false);
      state.activeLibraryId = id;
      state.current = null;
      state.selected = new Set();
      state.queue = [];
      els.quiz.classList.add('hidden');
      els.paperPreview.classList.add('hidden');
      els.empty.classList.remove('hidden');
      persistLibraries();
      render();
      setStatus(`已切换到题库：${activeLibrary().name}`);
    }

    function createLibrary() {
      const name = normalizeText(prompt('请输入新题库名称，例如：软件测试、软件项目管理') || '');
      if (!name) return;
      if (state.libraries.some((item) => item.name === name)) {
        setStatus('这个题库已经存在，已为你切换过去。');
        switchLibrary(findOrCreateLibrary(name).id);
        return;
      }
      const library = makeLibrary(name);
      state.libraries.push(library);
      switchLibrary(library.id);
      setStatus(`已新建题库：${name}`);
    }

    function renameLibrary() {
      const library = activeLibrary();
      const name = normalizeText(prompt('请输入新的题库名称', library.name) || '');
      if (!name || name === library.name) return;
      if (state.libraries.some((item) => item.id !== library.id && item.name === name)) {
        setStatus('已经有同名题库了，换个名字会更稳。');
        return;
      }
      library.name = name;
      library.id = makeLibraryId(name);
      state.activeLibraryId = library.id;
      library.bank = library.bank.map((item) => ({ ...item, libraryName: name }));
      save();
      setStatus(`题库已重命名为：${name}`);
    }

    function deleteLibrary() {
      if (state.libraries.length <= 1) {
        setStatus('至少保留一个题库。');
        return;
      }
      const library = activeLibrary();
      if (!confirm(`确定删除题库“${library.name}”吗？其中 ${library.bank.length} 道题和练习记录都会删除。`)) return;
      state.libraries = state.libraries.filter((item) => item.id !== library.id);
      state.activeLibraryId = state.libraries[0].id;
      state.current = null;
      state.selected = new Set();
      state.queue = [];
      if (state.exam.active) exitExam(false);
      save();
      els.quiz.classList.add('hidden');
      els.paperPreview.classList.add('hidden');
      els.empty.classList.remove('hidden');
      setStatus('题库已删除。');
    }

    function render() {
      renderLibraries();
      renderStats();
      renderFilters();
      syncExamConfigAvailability();
      renderList();
      renderWrongBook();
      els.randomBtn.disabled = state.bank.length === 0;
